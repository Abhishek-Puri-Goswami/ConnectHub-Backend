server:
  port: 8084

spring:
  application:
    name: media-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/connecthub_media?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:your_mysql_user}
    password: ${MYSQL_PASSWORD:your_value}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: media-service-group
      auto-offset-reset: earliest

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:connecthub-media-bucket}
  region: ${AWS_REGION:ap-south-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:your_value}
    secret-key: ${AWS_SECRET_ACCESS_KEY:your_value}

eureka:
  client:
    service-url:
      defaultZone: http://your_user:your_password@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: always

  boot:
    admin:
      client:
        url: http://${ADMIN_SERVER_HOST:localhost}:9090
        username: ${ADMIN_USER:your_admin_user}
        password: ${ADMIN_PASSWORD:your_value}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html




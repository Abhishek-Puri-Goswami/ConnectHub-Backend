server:
  port: 8761
spring:
  application:
    name: service-registry
  security:
    user:
      name: eureka
      password: eureka
  boot:
    admin:
      client:
        url: http://${ADMIN_SERVER_HOST:localhost}:9090
        username: ${ADMIN_USER:your_admin_user}
        password: ${VAR:your_password}
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://your_user:your_password@localhost:8761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always





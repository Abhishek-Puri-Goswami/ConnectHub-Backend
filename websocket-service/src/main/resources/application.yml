server:
  port: 8087
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  application:
    name: websocket-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
jwt:
  secret: ${JWT_SECRET:your_value}
eureka:
  client:
    service-url:
      defaultZone: http://your_user:your_password@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: always

  boot:
    admin:
      client:
        url: http://${ADMIN_SERVER_HOST:localhost}:9090
        username: ${ADMIN_USER:your_admin_user}
        password: ${VAR:your_password}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html





<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Verification Code</title>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #1e293b; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .header { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); padding: 32px 24px; text-align: center; }
        .header h1 { margin: 0; color: #ffffff; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .content { padding: 40px 32px; text-align: center; }
        .greeting { font-size: 20px; font-weight: 600; color: #e2e8f0; margin-bottom: 16px; }
        .message { font-size: 16px; line-height: 1.6; color: #cbd5e1; margin-bottom: 32px; }
        .otp-container { background-color: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin: 0 auto 32px auto; max-width: 300px; }
        .otp-code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 36px; font-weight: 700; color: #60a5fa; letter-spacing: 8px; margin: 0; }
        .warning { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; padding: 16px; background-color: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; border-radius: 4px; text-align: left; }
        .footer { background-color: #0f172a; padding: 24px; text-align: center; border-top: 1px solid #334155; }
        .footer p { margin: 0; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ConnectHub</h1>
        </div>
        <div class="content">
            <div class="greeting" th:text="${greeting}">Hello,</div>
            <div class="message" th:text="${message}">Here is your verification code:</div>
            
            <div class="otp-container">
                <p class="otp-code" th:text="${otp}">000000</p>
            </div>
            
            <div th:if="${warning != null}" class="warning" th:text="${warning}"></div>
            
            <div class="message" th:text="'This code will expire in ' + ${expiryMinutes} + ' minutes.'">This code will expire in 5 minutes.</div>
        </div>
        <div class="footer">
            <p>&copy; 2026 ConnectHub. All rights reserved.</p>
            <p>If you did not request this email, you can safely ignore it.</p>
        </div>
    </div>
</body>
</html>
